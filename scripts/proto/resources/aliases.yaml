# Compatibility aliases driven by scripts/proto/gen_aliases.py. Two sections:
#
#   module_aliases:  Top-level name renames. Each entry maps a legacy symbol
#                    to its current location, rendering
#                       `from <module> import <name> as <legacy>`
#                    in TikTokLive/proto/_aliases.py.
#
#   legacy_aliases:  Class-attribute renames. Each entry attaches an ``@property``
#                    to the class that proxies to the new v2 field, so user code
#                    reading legacy field names (e.g. ``user.username``) keeps
#                    working under v2. Rendered as a class-mutation block in the
#                    same _aliases.py file.
#
# Both sections are validated at generation time — if a target symbol or field
# is missing, the build fails loudly rather than deferring to runtime.

module_aliases:
  ProtoMessageFetchResultBaseProtoMessage:
    module: TikTokLiveProto.v2
    name: BaseProtoMessage

legacy_aliases:

  ExtendedUser:
    module: TikTokLive.proto.custom_proto
    properties:
      username:
        target: unique_id
        doc: Legacy alias; v2 renamed this field to ``unique_id``.
      nick_name:
        target: nickname
        doc: Legacy alias; v2 renamed this field to ``nickname``.
      badge_list:
        target: badges
        doc: Legacy alias; v2 renamed this field to ``badges``.

  ExtendedGift:
    module: TikTokLive.proto.custom_proto
    properties:
      name:
        target: gift_name
        doc: Legacy alias; v2 renamed this field to ``gift_name``.
      type:
        target: gift_type
        doc: Legacy alias; v2 renamed this field to ``gift_type``.
      image:
        target: gift_image
        doc: Legacy alias; v2 renamed this field to ``gift_image``.
